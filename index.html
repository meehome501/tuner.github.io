<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Guitar Tuner - Dochord</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-primary:#f5f5fa;
  --bg-card:#ffffff;
  --text-primary:#1a1a2e;
  --text-secondary:#7a7a95;
  --border-light:#e0e0ec;
  --accent-orange:#ff5722;
  --accent-orange-glow:rgba(255,87,34,0.2);
  --accent-orange-bg:rgba(255,87,34,0.08);
  --accent-green:#16b860;
  --accent-green-glow:rgba(22,184,96,0.2);
  --accent-green-bg:rgba(22,184,96,0.08);
  --accent-red:#e53755;
  --accent-red-glow:rgba(229,55,85,0.2);
  --accent-red-bg:rgba(229,55,85,0.08);
  --accent-blue:#4a7aed;
  --gradient-head:linear-gradient(180deg,#d9a0f7 0%,#b88ae0 25%,#9478c8 50%,#7a8ebf 100%);

  /* Responsive sizing variables */
  --guitar-width:320px;
  --guitar-height:310px;
  --head-width:130px;
  --head-height:278px;
  --btn-size:54px;
  --btn-font:1.15rem;
  --note-size:3.8rem;
  --note-circle:88px;
  --peg-shaft:32px;
  --peg-knob:10px;
  --container-pad:10px;
  --tuner-max:440px;
}

html,body{
  min-height:100vh;
  min-height:-webkit-fill-available;
  background:var(--bg-primary);
  font-family:'Kanit',sans-serif;
  -webkit-font-smoothing:antialiased;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

/* ── Wrapper ── */
.section-third-desc{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px 0 40px;
  min-height:100vh;
  min-height:-webkit-fill-available;
}

/* ── Tuning selector ── */
.tuning-selector{
  z-index:2;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:8px;
  padding:4px 12px 14px;
  width:100%;
}
.tuning-btn{
  font-family:'Kanit',sans-serif;
  font-size:0.88rem;
  font-weight:500;
  padding:8px 24px;
  border-radius:24px;
  border:2px solid var(--border-light);
  background:var(--bg-card);
  color:var(--text-secondary);
  cursor:pointer;
  transition:all 0.3s ease;
  box-shadow:0 1px 4px rgba(0,0,0,0.04);
  -webkit-appearance:none;
  touch-action:manipulation;
}
.tuning-btn.active{
  border-color:var(--accent-orange);
  color:var(--accent-orange);
  background:var(--accent-orange-bg);
  box-shadow:0 2px 12px var(--accent-orange-glow);
}
.tuning-btn:hover:not(.active){border-color:#bbb;color:#555;}

/* ── Tuner container ── */
.tuner-container{
  position:relative;
  z-index:1;
  width:min(var(--tuner-max),94vw);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 var(--container-pad);
}

/* ── Note display ── */
.note-display{
  text-align:center;
  margin-bottom:4px;
  min-height:100px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
.detected-note{
  font-family:'JetBrains Mono',monospace;
  font-size:var(--note-size);
  font-weight:700;
  line-height:1;
  width:var(--note-circle);
  height:var(--note-circle);
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  transition:all 0.3s ease;
}
.detected-note.in-tune{color:var(--accent-green);background:var(--accent-green-bg);box-shadow:0 0 30px var(--accent-green-glow);}
.detected-note.flat{color:var(--accent-orange);background:var(--accent-orange-bg);box-shadow:0 0 25px var(--accent-orange-glow);}
.detected-note.sharp{color:var(--accent-red);background:var(--accent-red-bg);box-shadow:0 0 25px var(--accent-red-glow);}
.detected-note.idle{color:var(--text-secondary);background:rgba(0,0,0,0.03);}
.cents-display{
  font-family:'JetBrains Mono',monospace;
  font-size:0.95rem;
  color:var(--text-secondary);
  margin-top:4px;
  height:20px;
}

/* ── Waveform ── */
.waveform-container{
  width:100%;
  max-width:380px;
  height:70px;
  position:relative;
  margin-bottom:2px;
}
#waveformCanvas{width:100%;height:100%;display:block;}

/* ── Gauge ── */
.gauge-container{
  width:100%;
  max-width:360px;
  height:48px;
  position:relative;
  margin:2px 0 4px;
}
.gauge-bar{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:88%;height:6px;border-radius:3px;opacity:0.55;
  background:linear-gradient(90deg,var(--accent-red) 0%,var(--accent-orange) 18%,var(--accent-green) 42%,var(--accent-green) 58%,var(--accent-orange) 82%,var(--accent-red) 100%);
}
.gauge-center{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:2px;height:22px;background:var(--accent-green);opacity:0.5;
}
.gauge-needle{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:14px;height:14px;border-radius:50%;
  background:var(--accent-orange);
  box-shadow:0 2px 8px var(--accent-orange-glow);
  transition:left 0.12s ease-out;z-index:2;
}
.gauge-needle.in-tune{background:var(--accent-green);box-shadow:0 2px 12px var(--accent-green-glow);width:16px;height:16px;}
.gauge-labels{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:94%;display:flex;justify-content:space-between;
  font-size:1.1rem;font-weight:700;color:var(--text-secondary);
  pointer-events:none;margin-top:22px;
}
.freq-display{
  font-family:'JetBrains Mono',monospace;
  font-size:0.78rem;color:var(--text-secondary);
  text-align:center;min-height:18px;opacity:0.7;margin-bottom:2px;
}

/* ── Mic button ── */
.mic-section{display:flex;justify-content:center;margin:6px 0 18px;}
.mic-btn{
  font-family:'Kanit',sans-serif;
  font-size:0.95rem;font-weight:500;
  display:flex;align-items:center;gap:10px;
  padding:12px 30px;border-radius:50px;
  border:2px solid var(--border-light);
  background:var(--bg-card);color:var(--text-secondary);
  cursor:pointer;transition:all 0.3s ease;
  box-shadow:0 1px 6px rgba(0,0,0,0.05);
  -webkit-appearance:none;touch-action:manipulation;
  min-height:48px; /* iOS touch target */
}
.mic-btn:hover{border-color:var(--accent-blue);color:var(--accent-blue);}
.mic-btn.active{
  border-color:var(--accent-green);color:var(--accent-green);
  background:var(--accent-green-bg);
  box-shadow:0 2px 20px var(--accent-green-glow);
  animation:pulse-mic 2s infinite;
}
@keyframes pulse-mic{
  0%,100%{box-shadow:0 2px 15px var(--accent-green-glow);}
  50%{box-shadow:0 2px 30px var(--accent-green-glow);}
}
.mic-icon{width:20px;height:20px;flex-shrink:0;}

/* ── Guitar section ── */
.guitar-section{
  position:relative;
  width:var(--guitar-width);
  height:var(--guitar-height);
  margin:0 auto;
}
.guitar-head{
  position:absolute;left:50%;top:0;
  transform:translateX(-50%);
  width:var(--head-width);
  height:var(--head-height);
  background:var(--gradient-head);
  border-radius:20px 20px 60px 60px;
  box-shadow:0 6px 25px rgba(0,0,0,0.15),inset 0 1px 6px rgba(255,255,255,0.25);
  z-index:1;overflow:hidden;
}
.guitar-head::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:52px;height:60px;background:rgba(255,255,255,0.1);border-radius:3px 3px 0 0;
}
.head-logo{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-58%);
  z-index:3;pointer-events:none;opacity:0.95;text-align:center;line-height:1.1;
}
.logo-main{
  display:block;font-family:'Kanit',sans-serif;
  font-size:1.45rem;font-weight:700;font-style:italic;
  color:white;text-shadow:0 2px 10px rgba(0,0,0,0.3);letter-spacing:0.5px;
}
.logo-sub{
  display:block;font-family:'Kanit',sans-serif;
  font-size:0.72rem;font-weight:400;color:rgba(255,255,255,0.7);margin-top:-1px;
}
.head-strings{
  position:absolute;top:28px;left:50%;transform:translateX(-50%);
  width:38px;height:220px;z-index:2;display:flex;justify-content:space-between;
}
.head-string{width:1.2px;height:100%;background:linear-gradient(180deg,rgba(255,255,255,0.5) 0%,rgba(255,255,255,0.15) 100%);}

/* Pegs */
.peg-row-wrap{position:absolute;display:flex;align-items:center;z-index:3;}
.peg-shaft{width:var(--peg-shaft);height:7px;border-radius:4px;background:linear-gradient(180deg,#ddb0dd 0%,#b888b8 100%);}
.peg-knob{width:var(--peg-knob);height:var(--peg-knob);border-radius:50%;background:linear-gradient(135deg,#ecc0ec,#b888b8);box-shadow:0 1px 4px rgba(0,0,0,0.2);flex-shrink:0;}
.peg-L1{top:32px;left:56px;flex-direction:row-reverse;}
.peg-L2{top:112px;left:56px;flex-direction:row-reverse;}
.peg-L3{top:192px;left:52px;flex-direction:row-reverse;}
.peg-L1 .peg-knob,.peg-L2 .peg-knob,.peg-L3 .peg-knob{margin-right:-1px;}
.peg-R1{top:32px;right:56px;}
.peg-R2{top:112px;right:56px;}
.peg-R3{top:192px;right:52px;}
.peg-R1 .peg-knob,.peg-R2 .peg-knob,.peg-R3 .peg-knob{margin-left:-1px;}

/* String buttons */
.string-btn{
  position:absolute;
  width:var(--btn-size);height:var(--btn-size);
  border-radius:50%;
  border:2.5px solid var(--border-light);
  background:var(--bg-card);color:var(--text-secondary);
  font-family:'JetBrains Mono',monospace;
  font-size:var(--btn-font);font-weight:700;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.25s ease;
  user-select:none;-webkit-tap-highlight-color:transparent;
  z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.06);
  touch-action:manipulation;
  -webkit-appearance:none;
}
.string-btn:hover{border-color:#aaa;color:#444;transform:scale(1.08);}
.string-btn:active,.string-btn.playing{
  border-color:var(--accent-orange);color:var(--accent-orange);
  background:var(--accent-orange-bg);
  box-shadow:0 2px 16px var(--accent-orange-glow);transform:scale(1.05);
}
.string-btn.matched{
  border-color:var(--accent-green);color:var(--accent-green);
  background:var(--accent-green-bg);box-shadow:0 2px 16px var(--accent-green-glow);
}

/* Button positions (default) */
.btn-s2{top:10px;left:0;}
.btn-s1{top:90px;left:0;}
.btn-s0{top:170px;left:0;}
.btn-s3{top:10px;right:0;}
.btn-s4{top:90px;right:0;}
.btn-s5{top:170px;right:0;}

.string-label{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  font-size:0.8rem;color:var(--text-secondary);opacity:0.5;z-index:5;
}

/* String indicators */
.string-numbers{
  display:flex;justify-content:center;gap:14px;margin-top:6px;
  font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:var(--text-secondary);
}
.string-num{width:28px;text-align:center;transition:color 0.3s;}
.string-num.active{color:var(--accent-orange);font-weight:700;}
.string-bars{display:flex;justify-content:center;gap:10px;margin:6px 0 14px;}
.string-bar{
  width:28px;height:34px;border-radius:4px;
  background:rgba(0,0,0,0.04);border:1.5px solid var(--border-light);
  transition:all 0.3s ease;
}
.string-bar.active{background:var(--accent-orange);border-color:var(--accent-orange);box-shadow:0 2px 10px var(--accent-orange-glow);}
.string-bar.matched{background:var(--accent-green);border-color:var(--accent-green);box-shadow:0 2px 10px var(--accent-green-glow);}

.instructions{
  text-align:center;font-size:0.78rem;color:var(--text-secondary);
  padding:8px 20px 30px;max-width:420px;line-height:1.6;opacity:0.6;
}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.tuner-container > *{animation:fadeIn 0.4s ease forwards;}

/* ────────────────────────────────────────────────
   RESPONSIVE BREAKPOINTS
   iPad mini  : 768px
   iPad       : 810px
   iPad Air   : 820px
   iPad Pro 11: 1024px
   iPad Pro 12: 1366px
   ──────────────────────────────────────────────── */

/* Small phones */
@media(max-width:360px){
  :root{
    --guitar-width:280px;--guitar-height:280px;
    --head-width:115px;--head-height:250px;
    --btn-size:46px;--btn-font:1rem;
    --note-size:3.2rem;--note-circle:76px;
    --peg-shaft:26px;--peg-knob:9px;
  }
  .btn-s2,.btn-s3{top:8px;}
  .btn-s1,.btn-s4{top:80px;}
  .btn-s0,.btn-s5{top:152px;}
  .peg-L1,.peg-R1{top:28px;}
  .peg-L2,.peg-R2{top:100px;}
  .peg-L3,.peg-R3{top:172px;}
}

/* iPad portrait — 768px to 1024px */
@media(min-width:768px) and (max-width:1024px) and (orientation:portrait){
  :root{
    --guitar-width:400px;--guitar-height:380px;
    --head-width:160px;--head-height:340px;
    --btn-size:68px;--btn-font:1.4rem;
    --note-size:5rem;--note-circle:110px;
    --peg-shaft:40px;--peg-knob:13px;
    --tuner-max:560px;
    --container-pad:20px;
  }
  .tuning-btn{font-size:1rem;padding:10px 32px;}
  .mic-btn{font-size:1.1rem;padding:14px 36px;min-height:56px;}
  .mic-icon{width:24px;height:24px;}
  .waveform-container{max-width:480px;height:90px;}
  .gauge-container{max-width:460px;}
  .cents-display{font-size:1.1rem;}
  .freq-display{font-size:0.9rem;}
  .string-num{width:36px;font-size:1rem;}
  .string-bar{width:36px;height:42px;}
  .string-numbers{gap:18px;}
  .string-bars{gap:12px;}
  .instructions{font-size:0.9rem;max-width:520px;}

  /* Button positions scaled for bigger guitar */
  .btn-s2{top:12px;left:0;}
  .btn-s1{top:110px;left:0;}
  .btn-s0{top:208px;left:0;}
  .btn-s3{top:12px;right:0;}
  .btn-s4{top:110px;right:0;}
  .btn-s5{top:208px;right:0;}

  .peg-L1{top:38px;left:68px;}
  .peg-L2{top:138px;left:68px;}
  .peg-L3{top:238px;left:62px;}
  .peg-R1{top:38px;right:68px;}
  .peg-R2{top:138px;right:68px;}
  .peg-R3{top:238px;right:62px;}

  .head-strings{width:48px;height:272px;top:34px;}
  .guitar-head::after{width:64px;height:74px;}
  .logo-main{font-size:1.8rem;}
  .logo-sub{font-size:0.88rem;}
}

/* iPad landscape — 768px+ width, landscape */
@media(min-width:768px) and (orientation:landscape){
  :root{
    --guitar-width:360px;--guitar-height:340px;
    --head-width:148px;--head-height:310px;
    --btn-size:62px;--btn-font:1.3rem;
    --note-size:4.5rem;--note-circle:100px;
    --peg-shaft:36px;--peg-knob:12px;
    --tuner-max:520px;
    --container-pad:16px;
  }
  .tuning-btn{font-size:0.95rem;padding:9px 28px;}
  .mic-btn{font-size:1rem;padding:13px 34px;}
  .waveform-container{max-width:440px;height:80px;}
  .gauge-container{max-width:420px;}
  .cents-display{font-size:1.05rem;}
  .string-num{width:32px;font-size:0.95rem;}
  .string-bar{width:32px;height:38px;}
  .string-numbers{gap:16px;}
  .string-bars{gap:11px;}

  .btn-s2{top:10px;left:0;}
  .btn-s1{top:100px;left:0;}
  .btn-s0{top:190px;left:0;}
  .btn-s3{top:10px;right:0;}
  .btn-s4{top:100px;right:0;}
  .btn-s5{top:190px;right:0;}

  .peg-L1{top:34px;left:62px;}
  .peg-L2{top:124px;left:62px;}
  .peg-L3{top:214px;left:58px;}
  .peg-R1{top:34px;right:62px;}
  .peg-R2{top:124px;right:62px;}
  .peg-R3{top:214px;right:58px;}

  .head-strings{width:44px;height:250px;top:30px;}
  .logo-main{font-size:1.65rem;}
}

/* iPad Pro 11" and 12.9" portrait */
@media(min-width:1024px) and (max-width:1366px) and (orientation:portrait){
  :root{
    --guitar-width:460px;--guitar-height:440px;
    --head-width:185px;--head-height:395px;
    --btn-size:80px;--btn-font:1.6rem;
    --note-size:5.8rem;--note-circle:128px;
    --peg-shaft:46px;--peg-knob:15px;
    --tuner-max:640px;
    --container-pad:24px;
  }
  .tuning-btn{font-size:1.1rem;padding:12px 36px;}
  .mic-btn{font-size:1.2rem;padding:16px 42px;min-height:60px;}
  .mic-icon{width:28px;height:28px;}
  .waveform-container{max-width:560px;height:100px;}
  .gauge-container{max-width:540px;}
  .cents-display{font-size:1.2rem;}
  .freq-display{font-size:1rem;}
  .string-num{width:42px;font-size:1.1rem;}
  .string-bar{width:42px;height:50px;}
  .string-numbers{gap:20px;}
  .string-bars{gap:14px;}
  .instructions{font-size:1rem;max-width:600px;}
  .note-display{min-height:130px;}

  .btn-s2{top:14px;left:0;}
  .btn-s1{top:128px;left:0;}
  .btn-s0{top:242px;left:0;}
  .btn-s3{top:14px;right:0;}
  .btn-s4{top:128px;right:0;}
  .btn-s5{top:242px;right:0;}

  .peg-L1{top:44px;left:80px;}
  .peg-L2{top:160px;left:80px;}
  .peg-L3{top:276px;left:72px;}
  .peg-R1{top:44px;right:80px;}
  .peg-R2{top:160px;right:80px;}
  .peg-R3{top:276px;right:72px;}

  .head-strings{width:56px;height:316px;top:40px;}
  .guitar-head::after{width:76px;height:88px;}
  .guitar-head{border-radius:26px 26px 80px 80px;}
  .logo-main{font-size:2.1rem;}
  .logo-sub{font-size:1rem;}
}

/* iPad Pro landscape */
@media(min-width:1024px) and (orientation:landscape){
  :root{
    --guitar-width:420px;--guitar-height:400px;
    --head-width:170px;--head-height:360px;
    --btn-size:74px;--btn-font:1.5rem;
    --note-size:5.4rem;--note-circle:118px;
    --peg-shaft:42px;--peg-knob:14px;
    --tuner-max:600px;
    --container-pad:20px;
  }
  .tuning-btn{font-size:1.05rem;padding:11px 32px;}
  .mic-btn{font-size:1.15rem;padding:15px 40px;}
  .mic-icon{width:26px;height:26px;}
  .waveform-container{max-width:520px;height:90px;}
  .gauge-container{max-width:500px;}
  .cents-display{font-size:1.15rem;}
  .freq-display{font-size:0.95rem;}
  .string-num{width:38px;font-size:1.05rem;}
  .string-bar{width:38px;height:46px;}
  .string-numbers{gap:18px;}
  .string-bars{gap:13px;}
  .instructions{font-size:0.95rem;max-width:560px;}

  .btn-s2{top:12px;left:0;}
  .btn-s1{top:118px;left:0;}
  .btn-s0{top:224px;left:0;}
  .btn-s3{top:12px;right:0;}
  .btn-s4{top:118px;right:0;}
  .btn-s5{top:224px;right:0;}

  .peg-L1{top:40px;left:74px;}
  .peg-L2{top:148px;left:74px;}
  .peg-L3{top:256px;left:66px;}
  .peg-R1{top:40px;right:74px;}
  .peg-R2{top:148px;right:74px;}
  .peg-R3{top:256px;right:66px;}

  .head-strings{width:52px;height:288px;top:36px;}
  .guitar-head{border-radius:24px 24px 72px 72px;}
  .logo-main{font-size:1.95rem;}
  .logo-sub{font-size:0.94rem;}
}

/* Very large screens / iPad Pro 12.9" landscape */
@media(min-width:1366px){
  :root{
    --guitar-width:500px;--guitar-height:480px;
    --head-width:200px;--head-height:430px;
    --btn-size:88px;--btn-font:1.75rem;
    --note-size:6.4rem;--note-circle:140px;
    --peg-shaft:50px;--peg-knob:16px;
    --tuner-max:700px;
    --container-pad:28px;
  }
  .tuning-btn{font-size:1.15rem;padding:14px 40px;}
  .mic-btn{font-size:1.3rem;padding:18px 48px;min-height:64px;}
  .mic-icon{width:30px;height:30px;}
  .waveform-container{max-width:620px;height:110px;}
  .gauge-container{max-width:600px;}
  .cents-display{font-size:1.3rem;}
  .freq-display{font-size:1.05rem;}
  .string-num{width:46px;font-size:1.2rem;}
  .string-bar{width:46px;height:56px;}
  .string-numbers{gap:22px;}
  .string-bars{gap:16px;}
  .instructions{font-size:1.05rem;max-width:660px;}
  .note-display{min-height:150px;}

  .btn-s2{top:16px;left:0;}
  .btn-s1{top:142px;left:0;}
  .btn-s0{top:268px;left:0;}
  .btn-s3{top:16px;right:0;}
  .btn-s4{top:142px;right:0;}
  .btn-s5{top:268px;right:0;}

  .peg-L1{top:50px;left:88px;}
  .peg-L2{top:180px;left:88px;}
  .peg-L3{top:310px;left:78px;}
  .peg-R1{top:50px;right:88px;}
  .peg-R2{top:180px;right:88px;}
  .peg-R3{top:310px;right:78px;}

  .head-strings{width:62px;height:346px;top:44px;}
  .guitar-head::after{width:84px;height:96px;}
  .guitar-head{border-radius:30px 30px 90px 90px;}
  .logo-main{font-size:2.4rem;}
  .logo-sub{font-size:1.1rem;}
}
</style>
</head>
<body>
<section class="section-third-desc">

<div class="tuning-selector">
  <button class="tuning-btn active" data-tuning="standard" onclick="setTuning('standard')">มาตรฐาน E</button>
  <button class="tuning-btn" data-tuning="half-down" onclick="setTuning('half-down')">ลดครึ่งเสียง E♭</button>
</div>

<div class="tuner-container">
  <div class="note-display">
    <div class="detected-note idle" id="detectedNote">—</div>
    <div class="cents-display" id="centsDisplay"></div>
  </div>

  <div class="waveform-container">
    <canvas id="waveformCanvas"></canvas>
  </div>

  <div class="gauge-container">
    <div class="gauge-bar"></div>
    <div class="gauge-center"></div>
    <div class="gauge-needle" id="gaugeNeedle"></div>
    <div class="gauge-labels"><span>♭</span><span>#</span></div>
  </div>

  <div class="freq-display" id="freqDisplay"></div>

  <div class="mic-section">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">
      <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="23"></line>
        <line x1="8" y1="23" x2="16" y2="23"></line>
      </svg>
      <span id="micLabel">เปิดไมโครโฟน</span>
    </button>
  </div>

  <div class="guitar-section">
    <div class="guitar-head">
      <div class="head-logo">
        <span class="logo-main">Dochord</span>
        <span class="logo-sub">.com</span>
      </div>
      <div class="head-strings">
        <div class="head-string"></div><div class="head-string"></div>
        <div class="head-string"></div><div class="head-string"></div>
        <div class="head-string"></div><div class="head-string"></div>
      </div>
    </div>

    <div class="peg-row-wrap peg-L1"><div class="peg-knob"></div><div class="peg-shaft"></div></div>
    <div class="peg-row-wrap peg-L2"><div class="peg-knob"></div><div class="peg-shaft"></div></div>
    <div class="peg-row-wrap peg-L3"><div class="peg-knob"></div><div class="peg-shaft"></div></div>
    <div class="peg-row-wrap peg-R1"><div class="peg-shaft"></div><div class="peg-knob"></div></div>
    <div class="peg-row-wrap peg-R2"><div class="peg-shaft"></div><div class="peg-knob"></div></div>
    <div class="peg-row-wrap peg-R3"><div class="peg-shaft"></div><div class="peg-knob"></div></div>

    <button class="string-btn btn-s2" data-string="2" onclick="playString(2)">D</button>
    <button class="string-btn btn-s1" data-string="1" onclick="playString(1)">A</button>
    <button class="string-btn btn-s0" data-string="0" onclick="playString(0)">E</button>
    <button class="string-btn btn-s3" data-string="3" onclick="playString(3)">G</button>
    <button class="string-btn btn-s4" data-string="4" onclick="playString(4)">B</button>
    <button class="string-btn btn-s5" data-string="5" onclick="playString(5)">E</button>
    <div class="string-label">String</div>
  </div>

  <div class="string-numbers">
    <span class="string-num" data-idx="0">6</span>
    <span class="string-num" data-idx="1">5</span>
    <span class="string-num active" data-idx="2">4</span>
    <span class="string-num" data-idx="3">3</span>
    <span class="string-num" data-idx="4">2</span>
    <span class="string-num" data-idx="5">1</span>
  </div>

  <div class="string-bars">
    <div class="string-bar" data-idx="0"></div>
    <div class="string-bar" data-idx="1"></div>
    <div class="string-bar active" data-idx="2"></div>
    <div class="string-bar" data-idx="3"></div>
    <div class="string-bar" data-idx="4"></div>
    <div class="string-bar" data-idx="5"></div>
  </div>
</div>

<div class="instructions">
  กดปุ่มตัวโน้ตเพื่อฟังเสียง หรือเปิดไมโครโฟนแล้วดีดสายเพื่อจูน<br>
  <span style="color:var(--accent-green);">●</span> ตรง &nbsp;
  <span style="color:var(--accent-orange);">●</span> ต่ำไป &nbsp;
  <span style="color:var(--accent-red);">●</span> สูงไป
</div>

</section>

<script>
const TUNINGS={
  standard:{notes:[
    {name:'E',freq:82.41},{name:'A',freq:110.00},{name:'D',freq:146.83},
    {name:'G',freq:196.00},{name:'B',freq:246.94},{name:'E',freq:329.63}
  ]},
  'half-down':{notes:[
    {name:'E♭',freq:77.78},{name:'A♭',freq:103.83},{name:'D♭',freq:138.59},
    {name:'G♭',freq:185.00},{name:'B♭',freq:233.08},{name:'E♭',freq:311.13}
  ]}
};
const ALL_NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
let currentTuning='standard',audioCtx=null,micStream=null,
    analyserNode=null,micActive=false,animFrameId=null,
    playingGain=null,activeStringIdx=-1;

const $=id=>document.getElementById(id);
const detectedNoteEl=$('detectedNote'),centsDisplayEl=$('centsDisplay'),
      gaugeNeedleEl=$('gaugeNeedle'),freqDisplayEl=$('freqDisplay'),
      micBtn=$('micBtn'),micLabel=$('micLabel'),
      waveformCanvas=$('waveformCanvas');
let waveCtx=waveformCanvas.getContext('2d');

function getAudioCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

function setTuning(t){
  currentTuning=t;
  document.querySelectorAll('.tuning-btn').forEach(b=>b.classList.toggle('active',b.dataset.tuning===t));
  const notes=TUNINGS[t].notes;
  document.querySelectorAll('.string-btn').forEach(b=>{b.textContent=notes[parseInt(b.dataset.string)].name;});
  clearActiveString();
}

function playString(idx){
  const ctx=getAudioCtx(),freq=TUNINGS[currentTuning].notes[idx].freq;
  stopTone(); setActiveString(idx);
  const osc=ctx.createOscillator(),gain=ctx.createGain(),filter=ctx.createBiquadFilter();
  osc.type='sawtooth'; osc.frequency.setValueAtTime(freq,ctx.currentTime);
  filter.type='lowpass'; filter.frequency.setValueAtTime(freq*4,ctx.currentTime); filter.Q.setValueAtTime(1,ctx.currentTime);
  gain.gain.setValueAtTime(0,ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.8,ctx.currentTime+0.01);
  gain.gain.exponentialRampToValueAtTime(0.4,ctx.currentTime+0.3);
  gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+3.5);
  osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime+3.5);
  playingGain=gain;
  const btn=document.querySelector(`.string-btn[data-string="${idx}"]`);
  btn.classList.add('playing');
  osc.onended=()=>btn.classList.remove('playing');
  setTimeout(()=>btn.classList.remove('playing'),3500);
}

function stopTone(){
  if(playingGain){
    try{const c=getAudioCtx();
      playingGain.gain.cancelScheduledValues(c.currentTime);
      playingGain.gain.setValueAtTime(playingGain.gain.value,c.currentTime);
      playingGain.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.05);
    }catch(e){}
  }
  document.querySelectorAll('.string-btn.playing').forEach(b=>b.classList.remove('playing'));
}

function setActiveString(idx){
  activeStringIdx=idx;
  document.querySelectorAll('.string-btn').forEach(b=>b.classList.remove('matched'));
  document.querySelectorAll('.string-bar').forEach(b=>{
    b.classList.remove('active','matched');
    if(parseInt(b.dataset.idx)===idx) b.classList.add('active');
  });
  document.querySelectorAll('.string-num').forEach(n=>n.classList.toggle('active',parseInt(n.dataset.idx)===idx));
}

function clearActiveString(){
  activeStringIdx=-1;
  document.querySelectorAll('.string-bar').forEach(b=>b.classList.remove('active','matched'));
  document.querySelectorAll('.string-num').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.string-btn').forEach(b=>b.classList.remove('matched'));
}

async function toggleMic(){micActive?stopMic():await startMic();}

async function startMic(){
  try{
    const ctx=getAudioCtx();
    micStream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}
    });
    const src=ctx.createMediaStreamSource(micStream);
    analyserNode=ctx.createAnalyser(); analyserNode.fftSize=4096; analyserNode.smoothingTimeConstant=0.8;
    src.connect(analyserNode);
    micActive=true; micBtn.classList.add('active'); micLabel.textContent='ปิดไมโครโฟน';
    detectPitch();
  }catch(e){alert('ไม่สามารถเข้าถึงไมโครโฟนได้ กรุณาอนุญาตการเข้าถึง');}
}

function stopMic(){
  micActive=false;
  if(micStream){micStream.getTracks().forEach(t=>t.stop()); micStream=null;}
  if(animFrameId){cancelAnimationFrame(animFrameId); animFrameId=null;}
  micBtn.classList.remove('active'); micLabel.textContent='เปิดไมโครโฟน';
  detectedNoteEl.textContent='—'; detectedNoteEl.className='detected-note idle';
  centsDisplayEl.textContent=''; freqDisplayEl.textContent='';
  gaugeNeedleEl.style.left='50%'; gaugeNeedleEl.className='gauge-needle';
  clearWaveform();
}

function detectPitch(){
  if(!micActive||!analyserNode) return;
  const ctx=getAudioCtx(),buf=new Float32Array(analyserNode.fftSize);
  (function loop(){
    if(!micActive) return;
    animFrameId=requestAnimationFrame(loop);
    analyserNode.getFloatTimeDomainData(buf); drawWaveform(buf);
    const f=autoCorrelate(buf,ctx.sampleRate);
    if(f>0) updateDisplay(f);
    else{
      detectedNoteEl.textContent='—'; detectedNoteEl.className='detected-note idle';
      centsDisplayEl.textContent=''; freqDisplayEl.textContent='';
      gaugeNeedleEl.style.left='50%'; gaugeNeedleEl.className='gauge-needle';
    }
  })();
}

function autoCorrelate(buf,sr){
  let rms=0;
  for(let i=0;i<buf.length;i++) rms+=buf[i]*buf[i];
  if(Math.sqrt(rms/buf.length)<0.008) return -1;
  const max=Math.floor(buf.length/2);
  let best=-1,bestC=0,found=false,corrs=new Array(max),last=1;
  for(let o=0;o<max;o++){
    let c=0;
    for(let i=0;i<max;i++) c+=Math.abs(buf[i]-buf[i+o]);
    c=1-(c/max); corrs[o]=c;
    if(c>0.9&&c>last){found=true; if(c>bestC){bestC=c; best=o;}}
    else if(found){
      const s=(corrs[best+1]-corrs[best-1])/(2*(2*corrs[best]-corrs[best-1]-corrs[best+1]));
      return sr/(best+(s||0));
    }
    last=c;
  }
  return bestC>0.01?sr/best:-1;
}

function updateDisplay(freq){
  const notes=TUNINGS[currentTuning].notes;
  let closest=-1,minD=Infinity;
  for(let i=0;i<notes.length;i++){
    const d=1200*Math.log2(freq/notes[i].freq);
    if(Math.abs(d)<Math.abs(minD)){minD=d; closest=i;}
  }
  const noteNum=12*Math.log2(freq/440),ri=Math.round(noteNum);
  let name=Math.abs(minD)<200&&closest>=0?notes[closest].name:ALL_NOTES[((ri%12)+12)%12];
  if(Math.abs(minD)<200&&closest>=0) setActiveString(closest);
  detectedNoteEl.textContent=name;
  const cents=Math.round(minD),abs=Math.abs(cents);
  if(abs<=5){
    detectedNoteEl.className='detected-note in-tune';
    centsDisplayEl.textContent='✓ ตรง!'; centsDisplayEl.style.color='var(--accent-green)';
    gaugeNeedleEl.className='gauge-needle in-tune';
    if(closest>=0){
      document.querySelector(`.string-btn[data-string="${closest}"]`)?.classList.add('matched');
      document.querySelector(`.string-bar[data-idx="${closest}"]`)?.classList.add('matched');
    }
  }else if(cents<0){
    detectedNoteEl.className='detected-note flat';
    centsDisplayEl.textContent=`${cents} cents (ต่ำ)`; centsDisplayEl.style.color='var(--accent-orange)';
    gaugeNeedleEl.className='gauge-needle';
  }else{
    detectedNoteEl.className='detected-note sharp';
    centsDisplayEl.textContent=`+${cents} cents (สูง)`; centsDisplayEl.style.color='var(--accent-red)';
    gaugeNeedleEl.className='gauge-needle';
  }
  gaugeNeedleEl.style.left=(50+(Math.max(-50,Math.min(50,cents))/50)*45)+'%';
  freqDisplayEl.textContent=freq.toFixed(1)+' Hz';
}

function resizeCanvas(){
  const r=waveformCanvas.parentElement.getBoundingClientRect();
  const d=window.devicePixelRatio||1;
  waveformCanvas.width=r.width*d;
  waveformCanvas.height=r.height*d;
  waveCtx=waveformCanvas.getContext('2d');
  waveCtx.setTransform(d,0,0,d,0,0);
}

function drawWaveform(buf){
  const d=window.devicePixelRatio||1,w=waveformCanvas.width/d,h=waveformCanvas.height/d;
  waveCtx.clearRect(0,0,w,h);
  const g=waveCtx.createLinearGradient(0,0,w,0);
  g.addColorStop(0,'rgba(140,90,220,0.1)'); g.addColorStop(0.25,'rgba(140,90,220,0.5)');
  g.addColorStop(0.4,'rgba(255,87,34,0.75)'); g.addColorStop(0.5,'rgba(255,87,34,0.95)');
  g.addColorStop(0.6,'rgba(255,87,34,0.75)'); g.addColorStop(0.75,'rgba(74,122,237,0.5)');
  g.addColorStop(1,'rgba(74,122,237,0.1)');
  const mid=h/2;
  waveCtx.beginPath(); waveCtx.moveTo(0,mid);
  for(let x=0;x<w;x++) waveCtx.lineTo(x,mid+(buf[Math.floor(x*buf.length/w)]||0)*mid*3);
  waveCtx.strokeStyle=g; waveCtx.lineWidth=2; waveCtx.stroke();
  waveCtx.beginPath(); waveCtx.moveTo(0,mid);
  for(let x=0;x<w;x++) waveCtx.lineTo(x,mid-(buf[Math.floor(x*buf.length/w)]||0)*mid*2.5);
  waveCtx.globalAlpha=0.2; waveCtx.strokeStyle=g; waveCtx.lineWidth=1.5; waveCtx.stroke();
  waveCtx.globalAlpha=1;
  waveCtx.beginPath(); waveCtx.moveTo(w/2,0); waveCtx.lineTo(w/2,h);
  waveCtx.strokeStyle='rgba(0,0,0,0.06)'; waveCtx.lineWidth=1; waveCtx.stroke();
}

function clearWaveform(){
  const d=window.devicePixelRatio||1;
  waveCtx.clearRect(0,0,waveformCanvas.width/d,waveformCanvas.height/d);
}

// Handle orientation change for iPad
window.addEventListener('resize',()=>{
  resizeCanvas();
});
window.addEventListener('orientationchange',()=>{
  setTimeout(resizeCanvas,200);
});

resizeCanvas();
setTuning('standard');
</script>
</body>
</html>
